name: Sync Upstream

on:
  schedule:
    - cron: '0 0 * * *' # 每天国际标准时间 0:00（北京时间早上 8:00）自动检查更新
  workflow_dispatch: # 支持手动点击按钮触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync upstream
        uses: repo-sync/github-sync@v2
        with:
          source_repo: "https://github.com/huilang-me/CF-Server-Monitor" # 改为原作者的实际仓库地址
          source_branch: "main"
          destination_branch: "main"
          github_token: ${{ secrets.GITHUB_TOKEN }}
